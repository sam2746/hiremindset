services:
  api:
    build: .
    command: uvicorn hiremindset.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - CORS_ORIGINS=*

  streamlit:
    build: .
    command: streamlit run streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      # Streamlit server calls API (container → container)
      - API_PUBLIC_URL=http://api:8000
    depends_on:
      - api
